    <circle cx="920" cy="220" r="3" fill="#c084fc"/>
    <circle cx="880" cy="280" r="5" fill="#7c3aed"/>
    <circle cx="950" cy="160" r="3" fill="#a855f7"/>
    <circle cx="1000" cy="240" r="4" fill="#c084fc"/>
    <circle cx="960" cy="310" r="3" fill="#7c3aed"/>
    <circle cx="1050" cy="200" r="4" fill="#a855f7"/>
    <circle cx="1020" cy="280" r="3" fill="#c084fc"/>
    <circle cx="1080" cy="260" r="5" fill="#7c3aed"/>
    <circle cx="1100" cy="180" r="3" fill="#a855f7"/>
    <line x1="850" y1="180" x2="920" y2="220" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="920" y1="220" x2="880" y2="280" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="950" y1="160" x2="1000" y2="240" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="1000" y1="240" x2="960" y2="310" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="1050" y1="200" x2="1020" y2="280" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="1020" y1="280" x2="1080" y2="260" stroke="#c084fc" stroke-width="0.5"/>
    <line x1="880" y1="280" x2="960" y2="310" stroke="#c084fc" stroke-width="0.5"/>
    <line x1="920" y1="220" x2="1000" y2="240" stroke="#c084fc" stroke-width="0.5"/>
    <line x1="1050" y1="200" x2="1100" y2="180" stroke="#c084fc" stroke-width="0.5"/>
