  <!-- Title -->
  <text x="80" y="220" font-family="system-ui,-apple-system,sans-serif" font-weight="200" font-size="96" fill="white" letter-spacing="-0.03em">compile</text>

  <!-- Purple accent line -->
  <rect x="80" y="248" width="60" height="2" fill="url(#purple)" rx="1"/>

  <!-- Tagline -->
  <text x="80" y="300" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="28" fill="#9ca3af">We design biological brains.</text>
  <text x="80" y="338" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="28" fill="#9ca3af">Synthetic neuroscience starts now.</text>

  <!-- Stats bar -->
  <g transform="translate(80, 410)">
    <text font-family="system-ui,-apple-system,sans-serif" font-weight="200" font-size="42" fill="white">22</text>
    <text y="24" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="11" fill="#6b7280" letter-spacing="0.1em">RESULTS</text>

    <text x="140" font-family="system-ui,-apple-system,sans-serif" font-weight="200" font-size="42" fill="white">2</text>
    <text x="140" y="24" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="11" fill="#6b7280" letter-spacing="0.1em">SPECIES</text>

    <text x="260" font-family="system-ui,-apple-system,sans-serif" font-weight="200" font-size="42" fill="white">8,158</text>
    <text x="260" y="24" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="11" fill="#6b7280" letter-spacing="0.1em">NEURON PROCESSOR</text>

    <text x="500" font-family="system-ui,-apple-system,sans-serif" font-weight="200" font-size="42" fill="#22c55e">851</text>
    <text x="500" y="24" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="11" fill="#6b7280" letter-spacing="0.1em">GROWN FROM SPEC</text>

    <text x="680" font-family="system-ui,-apple-system,sans-serif" font-weight="200" font-size="42" fill="#6b7280">577</text>
    <text x="680" y="24" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="11" fill="#6b7280" letter-spacing="0.1em">REAL FLYWIRE</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0a0a0f" opacity="0.5"/>
  <text x="80" y="612" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="14" fill="#6b7280">compile.now</text>
  <text x="1120" y="612" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="14" fill="#a855f7">founders@compile.now</text>
